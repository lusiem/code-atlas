name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        # Node 20 reached EOL 2026-04 and better-sqlite3 no longer ships
        # win32 prebuilds for it (source build breaks against VS 2026)
        node: [22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      # real-world smoke: index this repo and talk to the server over stdio
      - run: node dist/index.js index --root .
      - run: node scripts/smoke-stdio.mjs
